name: Add Submodules

on:
  # Allows you to run this workflow manually from the Actions tab or through HTTP API
  workflow_dispatch:

jobs:
  add_submodule:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Add circle Submodule
      run: |
        git config --global user.email "m.geerken@address-solutions.de"
        git config --global user.name "Michi71"
        git submodule add -b master https://github.com/raspberrypi/pico-sdk.git lib/pico-sdk
        git submodule add -b master https://github.com/raspberrypi/pico-extras.git lib/pico-extras
        git submodule add -b master https://github.com/raspberrypi/FreeRTOS-Kernel.git lib/FreeRTOS-Kernel
        git submodule init
        git submodule update
      
    - name: Commit changes
      run: |
        git config --global user.email "m.geerken@address-solutions.de"
        git config --global user.name "Michi71"
        git add .gitmodules circle
        git commit -m 'Added <repository> as a submodule'
        git push
